# Conda environment for biofilm-gpr-agb.
#
# Versions below are tested-compatible *minimums* (python and CUDA are pinned exactly).
# For an exact, fully reproducible environment, generate and commit a lockfile from a
# working install:
#     conda env export --no-builds > environment.lock.yml
name: biofilm-gpr-agb
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10.9
  - cudatoolkit=11.8
  - pytorch>=2.0
  - torchvision>=0.15
  - torchaudio>=2.0
  - pytorch-lightning>=2.0
  - torchmetrics>=1.0
  - gpytorch>=1.11
  - geopandas>=0.13
  - rasterio>=1.3
  - scikit-image>=0.21
  - scikit-learn>=1.1
  - scipy>=1.10
  - pandas>=1.5
  - numpy>=1.24,<2.0
  - h5py>=3.8
  - matplotlib>=3.7
  - seaborn>=0.12
  - shapely>=2.0
  - pyproj>=3.5
  - tqdm>=4.65
  - ipykernel
  - ipdb
  - psutil
  - pip
  - pip:
      - wandb>=0.15        # optional: experiment tracking (enable with USE_WANDB=true)
      - datasets>=2.10
      - huggingface-hub>=0.16
