# Environment config for the `pf-pc28` workstation.
#
# Selected automatically by src/config.py when the hostname is `pf-pc28`, or
# explicitly with `export AGBD_ENV=pf-pc28`. `data_root` can be overridden at
# runtime with `export DATA_ROOT=/somewhere/else`.
#
# This is the FLAT layout (no `Data/` sub-directory) that actually exists on
# this machine. Every path is templated on `{data_root}`.

data_root: /scratch3/gsialelli

paths:
  norm:         "{data_root}/patches"                                                  # AGBD HDF5 patches + norm stats
  tiles:        "{data_root}/S2_L2A"                                                    # Sentinel-2 L2A products / composites
  ch:           "{data_root}/CH"                                                        # canopy height
  ckpt:         "{data_root}/EcosystemAnalysis/Models/Biomes/weights"                   # BioFiLM checkpoints (+ *.pkl cfg sidecars)
  alos:         "{data_root}/ALOS"                                                      # ALOS PALSAR
  dem:          "{data_root}/ALOS"                                                      # ALOS DSM (same root as PALSAR)
  lc:           "{data_root}/LC"                                                        # Copernicus land cover (biome)
  region:       "{data_root}/BiomassDatasetCreation/Data/download_Sentinel"             # s2_tile_to_region-v3.pkl
  embeddings:   "{data_root}/EcosystemAnalysis/Models/Baseline/cat2vec/AGBD"                 # cat2vec embeddings
  predictions:  "{data_root}/EcosystemAnalysis/Models/Biomes/predictions"               # dense AGB rasters
  kriging:      "{data_root}/EcosystemAnalysis/Models/Biomes/kriging"                   # kriging intermediates/outputs
  gedi:         "{data_root}/GEDI"                                                      # GEDI L4A footprints
  sumatra:      "{data_root}/Sumatra-AGB"                                               # Sumatra reference + rasters
  s2_index_shp: "{data_root}/BiomassDatasetCreation/Data/download_Sentinel/sentinel_2_index_shapefile.shp"

# Convenience defaults so notebooks/scripts don't hard-code them.
defaults:
  arch: nico_film
  ens_models: ['17997535-1', '17997535-2', '17997535-3']
  cpus_per_task: 8
